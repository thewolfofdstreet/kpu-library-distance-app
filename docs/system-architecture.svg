<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">System Architecture Diagram for KPU Surrey Library Distance App</title>
  <desc id="desc">Architecture showing user browser, Vercel hosted React app, browser geolocation, React Leaflet map, OpenStreetMap tiles, Haversine distance calculation, and final UI output.</desc>

  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#eef8f3"/>
      <stop offset="52%" stop-color="#fdf8ea"/>
      <stop offset="100%" stop-color="#e8f0ff"/>
    </linearGradient>
    <linearGradient id="green" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f5b841"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 800 38px Arial, sans-serif; fill: #17231f; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #52635e; }
      .section { font: 800 18px Arial, sans-serif; fill: #0f766e; letter-spacing: 0.4px; }
      .boxTitle { font: 800 24px Arial, sans-serif; fill: #17231f; }
      .boxText { font: 400 16px Arial, sans-serif; fill: #52635e; }
      .smallText { font: 700 14px Arial, sans-serif; fill: #64748b; }
      .whiteTitle { font: 800 24px Arial, sans-serif; fill: #ffffff; }
      .whiteText { font: 400 16px Arial, sans-serif; fill: #e6fffb; }
      .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .thinArrow { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .card { fill: rgba(255,255,255,0.82); stroke: #d7e2dc; stroke-width: 2; filter: url(#shadow); }
      .pill { fill: #ffffff; stroke: #d7e2dc; stroke-width: 1.5; }
    </style>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>
  <circle cx="1280" cy="90" r="130" fill="#14b8a6" opacity="0.12"/>
  <circle cx="105" cy="785" r="170" fill="#f5b841" opacity="0.16"/>
  <circle cx="1220" cy="760" r="145" fill="#2563eb" opacity="0.11"/>

  <text x="70" y="82" class="title">KPU Surrey Library Distance App</text>
  <text x="70" y="115" class="subtitle">Simple web architecture using React, Vercel, browser geolocation, React Leaflet, and OpenStreetMap.</text>

  <rect x="70" y="155" width="1260" height="675" rx="28" fill="#ffffff" opacity="0.55" stroke="#d7e2dc" stroke-width="2"/>

  <text x="115" y="210" class="section">CLIENT SIDE</text>
  <text x="582" y="210" class="section">APPLICATION LOGIC</text>
  <text x="1032" y="210" class="section">FREE SERVICES</text>

  <rect x="115" y="250" width="300" height="170" rx="20" class="card"/>
  <circle cx="160" cy="305" r="28" fill="url(#blue)"/>
  <path d="M147 305 h26 M160 292 v26" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
  <text x="200" y="300" class="boxTitle">User Browser</text>
  <text x="200" y="329" class="boxText">Opens the Vercel URL</text>
  <text x="200" y="354" class="boxText">and allows location access</text>

  <rect x="115" y="500" width="300" height="170" rx="20" class="card"/>
  <circle cx="160" cy="555" r="28" fill="url(#gold)"/>
  <path d="M148 555 c8 -14 16 -14 24 0 c-8 16 -16 16 -24 0z" fill="#ffffff"/>
  <circle cx="160" cy="552" r="5" fill="#f97316"/>
  <text x="200" y="550" class="boxTitle">Final Page UI</text>
  <text x="200" y="579" class="boxText">Shows your marker, library</text>
  <text x="200" y="604" class="boxText">marker, route line, distance</text>

  <rect x="535" y="250" width="330" height="170" rx="20" fill="url(#green)" filter="url(#shadow)"/>
  <circle cx="585" cy="305" r="28" fill="#ffffff" opacity="0.22"/>
  <text x="575" y="315" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="#ffffff">R</text>
  <text x="630" y="300" class="whiteTitle">React + Vite App</text>
  <text x="630" y="329" class="whiteText">Runs fully in the browser</text>
  <text x="630" y="354" class="whiteText">No backend server required</text>

  <rect x="535" y="500" width="330" height="170" rx="20" class="card"/>
  <circle cx="585" cy="555" r="28" fill="#17231f"/>
  <text x="572" y="566" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="#f5b841">km</text>
  <text x="630" y="550" class="boxTitle">Distance Calculator</text>
  <text x="630" y="579" class="boxText">Uses Haversine formula</text>
  <text x="630" y="604" class="boxText">to calculate kilometers</text>

  <rect x="1010" y="250" width="280" height="145" rx="20" class="card"/>
  <circle cx="1055" cy="300" r="26" fill="url(#blue)"/>
  <path d="M1055 278 c-20 24 -20 47 0 60 c20 -13 20 -36 0 -60z" fill="#ffffff"/>
  <circle cx="1055" cy="300" r="7" fill="#2563eb"/>
  <text x="1095" y="296" class="boxTitle">Geolocation API</text>
  <text x="1095" y="325" class="boxText">Gets user's current</text>
  <text x="1095" y="350" class="boxText">latitude and longitude</text>

  <rect x="1010" y="455" width="280" height="145" rx="20" class="card"/>
  <circle cx="1055" cy="505" r="26" fill="url(#green)"/>
  <path d="M1042 492 h26 v26 h-26z" fill="#ffffff"/>
  <path d="M1042 501 h26 M1051 492 v26 M1059 492 v26" stroke="#0f766e" stroke-width="3"/>
  <text x="1095" y="501" class="boxTitle">OpenStreetMap</text>
  <text x="1095" y="530" class="boxText">Free map tiles used</text>
  <text x="1095" y="555" class="boxText">inside Leaflet map</text>

  <rect x="1010" y="655" width="280" height="95" rx="20" class="card"/>
  <circle cx="1055" cy="702" r="25" fill="url(#gold)"/>
  <text x="1044" y="712" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="#ffffff">K</text>
  <text x="1095" y="698" class="boxTitle">KPU Library</text>
  <text x="1095" y="727" class="boxText">Fixed destination coordinates</text>

  <rect x="535" y="710" width="330" height="82" rx="18" class="pill"/>
  <text x="565" y="744" class="boxTitle">React Leaflet Map</text>
  <text x="565" y="771" class="boxText">Displays markers and route line</text>

  <path d="M415 335 C455 335 490 335 535 335" class="arrow"/>
  <path d="M865 325 C930 325 948 322 1010 322" class="thinArrow"/>
  <path d="M1010 322 C940 322 915 348 865 348" class="thinArrow"/>
  <path d="M865 750 C920 750 950 548 1010 528" class="thinArrow"/>
  <path d="M865 585 C930 585 950 705 1010 705" class="thinArrow"/>
  <path d="M700 420 C700 450 700 470 700 500" class="arrow"/>
  <path d="M700 670 C700 690 700 700 700 710" class="arrow"/>
  <path d="M535 585 C480 585 455 585 415 585" class="arrow"/>
  <path d="M535 750 C478 750 450 660 415 610" class="thinArrow"/>

  <rect x="188" y="735" width="230" height="46" rx="23" fill="#f8fafc" stroke="#d7e2dc"/>
  <text x="215" y="764" class="smallText">Hosted URL: Vercel</text>

  <rect x="835" y="155" width="455" height="46" rx="23" fill="#17231f"/>
  <text x="862" y="184" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#f5b841">Live app:</text>
  <text x="932" y="184" font-family="Arial, sans-serif" font-size="15" fill="#ffffff">https://kpu-library-distance-app.vercel.app/</text>
</svg>
